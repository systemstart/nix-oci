name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - run: nix develop --command make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - run: nix develop --command make test
      - uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - run: nix develop --command make build

  # Reproducibility: two matrix legs run on separate fresh VMs (i.e. different
  # machines) and each records the manifest digest of the example image; the
  # compare job asserts they are identical. If the writer were nondeterministic,
  # the digests would diverge and this fails.
  reproducibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        instance: [1, 2]
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - name: Build example image and record its manifest digest
        run: |
          img=$(nix build .#checks.x86_64-linux.exampleImage --no-link --print-out-paths)
          jq -r '.manifests[0].digest' "$img/index.json" > digest.txt
          cat digest.txt
      - uses: actions/upload-artifact@v4
        with:
          name: repro-digest-${{ matrix.instance }}
          path: digest.txt

  reproducibility-compare:
    needs: reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: digests
      - name: Assert the two machines produced the same digest
        run: |
          a=$(cat digests/repro-digest-1/digest.txt)
          b=$(cat digests/repro-digest-2/digest.txt)
          echo "instance 1: $a"
          echo "instance 2: $b"
          if [ "$a" != "$b" ]; then
            echo "::error::reproducibility failure: manifest digests differ across machines"
            exit 1
          fi
          echo "reproducible across machines: $a"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build, reproducibility-compare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
      - run: nix develop --command make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/nix-oci_*"
